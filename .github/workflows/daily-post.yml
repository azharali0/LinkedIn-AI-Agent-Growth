name: 🤖 Daily LinkedIn Post

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      custom_topic:
        description: "Custom topic (leave empty for auto)"
        required: false
        default: ""

jobs:
  generate-and-email:
    name: Generate Post & Send Approval Email
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install dependencies
        run: npm install

      - name: 🤖 Run LinkedIn Agent Pipeline
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          APPS_SCRIPT_URL:   ${{ secrets.APPS_SCRIPT_URL }}
          SECRET_TOKEN:      ${{ secrets.SECRET_TOKEN }}
          APPROVAL_EMAIL:    ${{ secrets.APPROVAL_EMAIL }}
          CUSTOM_TOPIC:      ${{ github.event.inputs.custom_topic }}
        run: node src/pipeline.js

      - name: ✅ Pipeline complete
        run: echo "Done! Check email for approval."
